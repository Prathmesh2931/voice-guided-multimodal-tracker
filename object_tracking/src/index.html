<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Control</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      user-select: none;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 28px 24px 24px;
      width: 280px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      text-align: center;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .mic-icon {
      width: 20px;
      height: 20px;
      fill: #374151;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      color: #111827;
      letter-spacing: -0.01em;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 20px;
      transition: background 0.3s, color 0.3s;
    }

    .status-badge.idle     { background: #f3f4f6; color: #6b7280; }
    .status-badge.active   { background: #d1fae5; color: #065f46; }
    .status-badge.stopped  { background: #fee2e2; color: #991b1b; }

    /* Animated mic ring when listening */
    .pulse-ring {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9fafb;
      border: 2px solid #e5e7eb;
      position: relative;
      transition: background 0.3s, border-color 0.3s;
    }

    .pulse-ring.listening {
      background: #ecfdf5;
      border-color: #6ee7b7;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.25); }
      50%       { box-shadow: 0 0 0 12px rgba(16, 185, 129, 0); }
    }

    .pulse-ring svg {
      width: 32px;
      height: 32px;
      transition: fill 0.3s;
    }

    .pulse-ring.listening svg { fill: #059669; }
    .pulse-ring:not(.listening) svg { fill: #9ca3af; }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    button {
      flex: 1;
      padding: 10px 0;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }

    .btn-start {
      background: #10b981;
      color: white;
    }

    .btn-start:hover:not(:disabled) { opacity: 0.9; }
    .btn-start:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-stop {
      background: #ef4444;
      color: white;
    }

    .btn-stop:hover:not(:disabled) { opacity: 0.9; }
    .btn-stop:disabled { opacity: 0.4; cursor: not-allowed; }

    .last-cmd {
      margin-top: 16px;
      padding: 10px 12px;
      background: #f9fafb;
      border-radius: 8px;
      font-size: 12px;
      color: #6b7280;
      min-height: 36px;
      text-align: left;
    }

    .last-cmd span {
      font-weight: 500;
      color: #111827;
    }

    .error-msg {
      margin-top: 10px;
      font-size: 12px;
      color: #dc2626;
      min-height: 16px;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <svg class="mic-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm7 10a1 1 0 0 0-2 0 5 5 0 0 1-10 0 1 1 0 0 0-2 0 7 7 0 0 0 6 6.92V20H9a1 1 0 0 0 0 2h6a1 1 0 0 0 0-2h-2v-2.08A7 7 0 0 0 19 11z"/>
    </svg>
    <h1>Voice Control</h1>
  </div>

  <div id="status-badge" class="status-badge idle">Idle</div>

  <div id="pulse-ring" class="pulse-ring">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm7 10a1 1 0 0 0-2 0 5 5 0 0 1-10 0 1 1 0 0 0-2 0 7 7 0 0 0 6 6.92V20H9a1 1 0 0 0 0 2h6a1 1 0 0 0 0-2h-2v-2.08A7 7 0 0 0 19 11z"/>
    </svg>
  </div>

  <div class="buttons">
    <button class="btn-start" id="btn-start" onclick="startListening()">Start</button>
    <button class="btn-stop"  id="btn-stop"  onclick="stopListening()" disabled>Stop</button>
  </div>

  <div class="last-cmd" id="last-cmd">
    Last command: <span>—</span>
  </div>

  <div class="error-msg" id="error-msg"></div>
</div>

<script>
  const API = 'http://localhost:5000';

  function setUI(state) {
    const badge = document.getElementById('status-badge');
    const ring  = document.getElementById('pulse-ring');
    const start = document.getElementById('btn-start');
    const stop  = document.getElementById('btn-stop');
    const err   = document.getElementById('error-msg');

    err.textContent = '';

    if (state === 'listening') {
      badge.textContent = 'Listening...';
      badge.className   = 'status-badge active';
      ring.classList.add('listening');
      start.disabled = true;
      stop.disabled  = false;
    } else if (state === 'stopped') {
      badge.textContent = 'Stopped';
      badge.className   = 'status-badge stopped';
      ring.classList.remove('listening');
      start.disabled = false;
      stop.disabled  = true;
    } else {
      badge.textContent = 'Idle';
      badge.className   = 'status-badge idle';
      ring.classList.remove('listening');
      start.disabled = false;
      stop.disabled  = true;
    }
  }

  function setLastCmd(text) {
    document.getElementById('last-cmd').innerHTML =
      'Last command: <span>' + text + '</span>';
  }

  async function startListening() {
    try {
      const r = await fetch(API + '/start', { method: 'POST' });
      if (!r.ok) throw new Error('Server error ' + r.status);
      const d = await r.json();
      setUI('listening');
      setLastCmd('Listening started');
    } catch (e) {
      document.getElementById('error-msg').textContent =
        'Cannot reach server. Is server.py running?';
    }
  }

  async function stopListening() {
    try {
      const r = await fetch(API + '/stop', { method: 'POST' });
      if (!r.ok) throw new Error('Server error ' + r.status);
      setUI('stopped');
      setLastCmd('Listening stopped');
    } catch (e) {
      document.getElementById('error-msg').textContent =
        'Cannot reach server. Is server.py running?';
    }
  }

  // Poll status on load so UI reflects actual state
  async function syncStatus() {
    try {
      const r = await fetch(API + '/status');
      const d = await r.json();
      setUI(d.listening ? 'listening' : 'idle');
    } catch (_) {}
  }

  syncStatus();
</script>
</body>
</html>
